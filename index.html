<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Mobile OCR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddlejs-core@latest/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddlejs-backend-webgl@latest/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@paddle-js-models/ocr@latest/lib/index.min.js"></script>

    <style>
        :root {
            --primary: #4285f4;
            --success: #34a853;
            --bg: #121212;
            --card: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .upload-btn {
            display: inline-block;
            background: var(--primary);
            padding: 18px 30px;
            border-radius: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            margin-top: 20px;
        }

        #status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.5;
        }

        #downloadBtn {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="title">AI Tabulator</h2>
        <p id="sub-title">Initializing Local AI...</p>
        
        <div id="loader" class="spinner"></div>

        <div id="ui" style="display:none;">
            <input type="file" id="imageInput" multiple accept="image/*" hidden>
            <label for="imageInput" class="upload-btn">Batch Upload Images</label>
            <div id="status">Ready to process up to 100 images.</div>
            <button id="downloadBtn">Download CSV Results</button>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const ui = document.getElementById('ui');
        const subTitle = document.getElementById('sub-title');
        let results = [];

        async function init() {
            try {
                // Check if libraries are loaded
                if (typeof ocr === 'undefined') {
                    console.log("Waiting for scripts...");
                    setTimeout(init, 1000);
                    return;
                }

                subTitle.innerText = "Setting up Mobile GPU...";
                await ocr.init();
                
                loader.style.display = 'none';
                ui.style.display = 'block';
                subTitle.innerText = "Private & Unlimited";
                console.log("OCR Ready");
            } catch (err) {
                subTitle.innerText = "Hardware error. Use Chrome/Safari.";
                console.error(err);
            }
        }

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;

            results = [];
            statusDiv.innerHTML = `<b style="color:#4285f4">Processing 0 / ${files.length}</b>`;
            
            for (let i = 0; i < files.length; i++) {
                const img = await fileToImage(files[i]);
                const textArray = await ocr.recognize(img);
                const fullText = textArray.join(" ").replace(/,/g, ""); 
                
                // Smart Normalization: Extract basic patterns
                const total = (fullText.match(/(\d+\.\d{2})/) || ["N/A"])[0];
                results.push({
                    id: i + 1,
                    date: new Date().toLocaleDateString(),
                    total: total,
                    preview: fullText.substring(0, 30)
                });

                statusDiv.innerHTML = `<b style="color:#4285f4">Processing ${i + 1} / ${files.length}</b>`;
            }

            statusDiv.innerText = "Batch complete!";
            document.getElementById('downloadBtn').style.display = 'block';
        });

        function fileToImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('downloadBtn').onclick = () => {
            let csv = "ID,Date,Total,Text_Preview\n";
            results.forEach(r => {
                csv += `${r.id},${r.date},${r.total},"${r.preview}..."\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Data_Export_${Date.now()}.csv`;
            a.click();
        };

        // Start initialization
        init();
    </script>
</body>
</html>
