<script>
    const statusDiv = document.getElementById('status');
    const loader = document.getElementById('loader');
    const ui = document.getElementById('ui');
    const subTitle = document.getElementById('sub-title');
    let results = [];

    async function init() {
        // 1. Check if scripts are even reaching the phone
        if (typeof ocr === 'undefined') {
            subTitle.innerText = "Connecting to AI server...";
            setTimeout(init, 2000);
            return;
        }

        try {
            subTitle.innerText = "Starting AI Engine...";
            
            // 2. Set a 10-second timer. If WebGL (GPU) fails, we force CPU mode.
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                subTitle.innerText = "Switching to Safe Mode (CPU)...";
                loadCPUFallback();
            }, 10000);

            await ocr.init(); // Attempt high-speed load
            
            clearTimeout(timeoutId);
            showUI();
        } catch (err) {
            console.error("GPU Load failed, trying CPU...");
            loadCPUFallback();
        }
    }

    async function loadCPUFallback() {
        try {
            // Force the 'cpu' backend which doesn't need special hardware permissions
            await ocr.init({ backend: 'cpu' }); 
            showUI();
        } catch (e) {
            subTitle.innerText = "Please use Chrome or Safari app.";
        }
    }

    function showUI() {
        loader.style.display = 'none';
        ui.style.display = 'block';
        subTitle.innerText = "Private Local Processing";
    }

    // Keep your existing fileToImage and downloadBtn logic below this...
    // [Insert your existing document.getElementById('imageInput').addEventListener code here]

    init();
</script>
